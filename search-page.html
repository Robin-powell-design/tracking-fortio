<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track your order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { min-height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; background: #f5f5f5 url('images/background-blobs.png') center center / cover no-repeat; background-attachment: fixed; }

    /* ── Nav — frosted glass ── */
    nav { flex-shrink: 0; width: 100%; background: rgba(255,255,255,0.62); backdrop-filter: blur(13px); -webkit-backdrop-filter: blur(13px); border-bottom: 1px solid rgba(255,255,255,0.34); box-shadow: 0 4px 12px rgba(46,47,113,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(16px, 2.5vw, 56px); height: clamp(56px, 6vw, 87px); z-index: 10; position: sticky; top: 0; }
    .nav-logo { flex-shrink: 0; display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { display: block; height: clamp(24px, 2.4vw, 28px); width: auto; object-fit: contain; max-width: none; }
    .nav-links { display: flex; align-items: center; gap: clamp(4px, 0.5vw, 8px); }
    .nav-links a, .nav-links span { display: flex; align-items: center; justify-content: center; padding: 6px clamp(10px, 0.9vw, 13.5px); border-radius: 100px; text-decoration: none; font-family: 'Inter', sans-serif; font-weight: 600; font-size: clamp(14px, 1vw, 16px); color: #2C50F2; letter-spacing: 0.08px; white-space: nowrap; }

    /* ── Hero blob (mobile only) ── */
    .hero-blob { display: none; }

    /* ── Badge (mobile only) ── */
    .badge { display: none; }

    /* ── Page body ── */
    .page-body {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 0; position: relative; overflow: hidden;
      background: transparent;
    }

    /* ── Centered content ── */
    .content-col { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: clamp(32px, 5vh, 80px) clamp(24px, 4vw, 60px); margin-top: -24px; }
    .content-inner { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 865px; }

    /* Text group */
    .text-group { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 28px; }
    h1 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: clamp(26px, 2.8vw, 48px); line-height: 1.3; color: #1e2125; letter-spacing: -0.24px; }
    .subtitle { font-family: 'Inter', sans-serif; font-weight: 500; font-size: clamp(14px, 1.1vw, 24px); line-height: 1.5; color: #1e2125; letter-spacing: 0.036px; }
    .tip { font-family: 'Inter', sans-serif; font-weight: 500; font-size: clamp(12px, 0.85vw, 18px); line-height: 1.6; color: #4a535c; opacity: 0.75; letter-spacing: 0.027px; }

    /* Search box */
    .search-box { display: flex; align-items: center; width: 100%; max-width: 865px; background: #fff; border: 1.254px solid rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 10px 10px 10px 22px; margin-bottom: 24px; gap: 8px; }
    .search-placeholder { flex: 1; min-width: 0; font-family: 'Inter', sans-serif; font-weight: 500; font-size: clamp(13px, 0.95vw, 17.5px); line-height: 1.4; color: #040404; border: none; outline: none; background: transparent; padding: 8px 4px; }
    .search-placeholder::placeholder { color: #66727f; font-weight: 400; }
    .track-btn { flex-shrink: 0; display: flex; align-items: center; justify-content: center; height: 60px; padding: 0 30px; background: #2C50F2; border-radius: 10px; border: none; cursor: pointer; transition: background 0.15s; }
    .track-btn:hover { background: #2445d6; }
    .track-btn span { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; color: #fff; letter-spacing: 0.032px; white-space: nowrap; }

    /* ── Footer ── */
    footer { position: absolute; bottom: 16px; left: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(24px, 4vw, 64px) 12px; background: none; border-top: 1px solid rgba(114,114,114,0.49); opacity: 0.5; }
    .footer-left p, .footer-right p { font-family: 'Montserrat', sans-serif; font-size: clamp(11px, 0.75vw, 14px); line-height: 19.5px; color: rgba(22, 22, 22, 0.5); }
    .footer-left .normal { font-weight: 500; }
    .footer-left .bold { font-weight: 600; text-transform: uppercase; }
    .footer-right p { font-weight: 500; }
    .footer-right .footer-climate { display: none; }

    /* ── Admin iframe preview scaling (desktop) ── */
    body.preview-embedded { font-size: 10px; }
    body.preview-embedded nav { height: 40px; padding: 0 12px; }
    body.preview-embedded .nav-logo img { height: 16px; }
    body.preview-embedded .nav-links span,
    body.preview-embedded .nav-links a { font-size: 10px; padding: 3px 6px; }
    body.preview-embedded .content-col { padding: 16px 20px; }
    body.preview-embedded .content-inner { max-width: 70%; }
    body.preview-embedded .text-group { gap: 4px; margin-bottom: 14px; }
    body.preview-embedded h1 { font-size: 18px; line-height: 1.3; }
    body.preview-embedded .subtitle { font-size: 11px; }
    body.preview-embedded .tip { font-size: 9px; }
    body.preview-embedded .search-box { max-width: 100%; padding: 4px 4px 4px 10px; gap: 4px; border-radius: 6px; }
    body.preview-embedded .search-placeholder { font-size: 10px; padding: 4px 4px; }
    body.preview-embedded .track-btn { height: 32px; padding: 0 14px; border-radius: 5px; }
    body.preview-embedded .track-btn span { font-size: 10px; }
    body.preview-embedded footer { bottom: 8px; padding: 6px 12px; }
    body.preview-embedded footer p { font-size: 8px; }
    body.preview-embedded .footer-left .bold { font-size: 8px; }

    /* ── Phone preview override (when admin switches to phone frame) ── */
    body.preview-embedded.phone-preview .hero-blob { display: block; width: 100%; height: 18vh; min-height: 120px; background: url('images/background-blobs.png') center 40% / cover no-repeat; position: relative; flex-shrink: 0; }
    body.preview-embedded.phone-preview .badge { display: inline-flex; position: absolute; top: 12px; left: 12px; padding: 5px 10px; border-radius: 9999px; background: transparent; border: 1px solid #2C50F2; z-index: 2; }
    body.preview-embedded.phone-preview .badge span { font-size: 9px; color: #3538cd; }
    body.preview-embedded.phone-preview .page-body { flex-direction: column; align-items: stretch; justify-content: flex-start; overflow: visible; }
    body.preview-embedded.phone-preview .content-col { flex: 1; width: 100%; background: rgba(255,255,255,0.28); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.56); border-radius: 16px 16px 0 0; box-shadow: 0 -1px 4px rgba(22,31,99,0.12); margin-top: -16px; padding: 24px 32px 0; }
    body.preview-embedded.phone-preview .content-inner { max-width: 100%; width: 100%; align-items: flex-start; text-align: left; }
    body.preview-embedded.phone-preview .text-group { align-items: flex-start; gap: 4px; margin-bottom: 16px; }
    body.preview-embedded.phone-preview h1 { font-size: 18px; font-weight: 600; color: #1f1541; }
    body.preview-embedded.phone-preview .subtitle { font-size: 10px; line-height: 1.5; color: #080808; }
    body.preview-embedded.phone-preview .tip { font-size: 8px; opacity: 1; color: #444751; text-align: left; }
    body.preview-embedded.phone-preview .search-box { flex-direction: column; align-items: stretch; background: transparent; border: none; padding: 0; gap: 8px; max-width: 100%; box-shadow: none; border-radius: 0; }
    body.preview-embedded.phone-preview .search-placeholder { height: 36px; background: #fff; border: 0.939px solid rgba(0,0,0,0.2); border-radius: 6px; padding: 0 10px; font-size: 9px; display: block; flex: none; width: 100%; }
    body.preview-embedded.phone-preview .track-btn { height: 38px; width: 100%; border-radius: 6px; padding: 0; }
    body.preview-embedded.phone-preview .track-btn span { font-size: 10px; font-weight: 600; }
    body.preview-embedded.phone-preview footer { position: relative; bottom: auto; margin-top: auto; padding: 4px 12px; border-top: 1px solid rgba(33,33,33,0.4); opacity: 0.5; }
    body.preview-embedded.phone-preview .footer-right .footer-copyright { display: none; }
    body.preview-embedded.phone-preview .footer-right .footer-climate { display: block; }

    /* ── Mobile / Phone preview ── */
    @media (max-width: 500px) {
      body { background: #f1f3f6; background-image: none; }

      /* Nav — near-transparent glass */
      nav { height: 88px; background: rgba(255,255,255,0.02); backdrop-filter: blur(13px); -webkit-backdrop-filter: blur(13px); border-bottom: 1px solid rgba(255,255,255,0.39); box-shadow: 0 4px 12px rgba(46,47,113,0.05); padding: 0 20px; }
      .nav-logo img { height: 28px; }
      .nav-links { gap: 24px; }
      .nav-links span, .nav-links a { color: #1e2125; font-size: 14px; font-weight: 600; padding: 0; }

      /* Hero blob — peek behind card */
      .hero-blob { display: block; width: 100%; height: 18vh; min-height: 120px; background: url('images/background-blobs.png') center 40% / cover no-repeat; position: relative; flex-shrink: 0; }

      /* Badge */
      .badge { display: inline-flex; position: absolute; top: 20px; left: 20px; align-items: center; padding: 8px 12px; border-radius: 9999px; background: transparent; border: 1px solid #2C50F2; z-index: 2; }
      .badge span { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; color: #3538cd; white-space: nowrap; }

      /* Page body */
      .page-body { flex: 1; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start; overflow: visible; background: transparent; }

      /* Content card — frosted glass */
      .content-col { flex: 1; width: 100%; background: rgba(255,255,255,0.28); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.56); border-radius: 24px 24px 0 0; box-shadow: 0 -1px 4px rgba(22,31,99,0.12); margin-top: -24px; padding: 39px 32px 0; z-index: 2; align-items: flex-start; }
      .content-inner { align-items: flex-start; text-align: left; max-width: 100%; width: 100%; flex: 1; }

      /* Text */
      .text-group { align-items: flex-start; gap: 6px; margin-bottom: 28px; }
      h1 { font-size: 32px; font-weight: 600; color: #1f1541; letter-spacing: -0.16px; line-height: 1.66; }
      .subtitle { font-size: 16px; line-height: 1.7; color: #080808; letter-spacing: 0.024px; }
      .tip { font-size: 12px; opacity: 1; color: #444751; text-align: left; letter-spacing: 0.018px; }

      /* Search: stacked */
      .search-box { flex-direction: column; align-items: stretch; background: transparent; border: none; border-radius: 0; padding: 0; gap: 16px; max-width: 100%; box-shadow: none; }
      .search-placeholder { height: 60px; background: #fff; border: 0.939px solid rgba(0,0,0,0.2); border-radius: 7.5px; padding: 0 16px; font-size: 12px; display: block; flex: none; width: 100%; }
      .track-btn { height: 63px; width: 100%; border-radius: 7.5px; padding: 0; }
      .track-btn span { font-size: 17px; font-weight: 600; }

      /* Footer */
      footer { position: relative; bottom: auto; margin-top: auto; padding: 4px 16px; border-top: 1px solid rgba(33,33,33,0.4); opacity: 0.5; }
      footer p { font-size: 12px !important; }
      .footer-right .footer-copyright { display: none; }
      .footer-right .footer-climate { display: block; }
    }

    /* ── Responsive (general mobile, wider than phone preview) ── */
    @media (min-width: 501px) and (max-width: 768px) {
      .page-body { padding: 0 16px; }
      .content-col { padding: 32px 0; }
      .content-inner { max-width: 100%; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .search-box { flex-direction: column; align-items: stretch; background: transparent; border: none; border-radius: 0; padding: 0; gap: 12px; max-width: 100%; }
      .search-placeholder { height: 52px; background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; padding: 0 16px; font-size: 14px; display: block; flex: none; width: 100%; }
      .track-btn { height: 52px; width: 100%; border-radius: 8px; padding: 0; }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a class="nav-logo" href="#">
    <img src="images/fortio-logo.svg" alt="Fortio" />
  </a>
  <div class="nav-links">
    <span>Shop</span>
    <span>FAQ</span>
  </div>
</nav>

<!-- Hero blob (visible on mobile only) -->
<div class="hero-blob">
  <div class="badge"><span>Delivery you can trust</span></div>
</div>

<!-- Page body -->
<div class="page-body">

  <!-- Content -->
  <div class="content-col">
    <div class="content-inner">

      <div class="text-group">
        <h1 id="page-title-display">Track your order</h1>
        <p class="subtitle">Enter your tracking number to see the latest delivery updates.</p>
        <p class="tip">&#x1F4A1; Your tracking number is in your shipping confirmation email</p>
      </div>

      <div class="search-box">
        <input class="search-placeholder" type="text" placeholder="Enter your tracking number: e.g. AA1223456789AUS" />
        <button class="track-btn" onclick="doSearch()"><span>Track my delivery</span></button>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-left">
      <p><span class="normal">Powered by </span><span class="bold">Fortio</span></p>
    </div>
    <div class="footer-right">
      <p class="footer-copyright">&copy; 2026 Fortio Limited. All rights reserved.</p>
      <p class="footer-climate">Climate Neutral</p>
    </div>
  </footer>

</div>

<script>
// ── Search action ──
function doSearch() {
  var input = document.querySelector('.search-placeholder');
  var val = input.value.trim();
  if (!val) { input.focus(); return; }
  window.location.href = 'tracking-demo.html?ref=' + encodeURIComponent(val);
}
document.querySelector('.search-placeholder').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// ── Branding ──
function applyBranding(c) {
  const nav = document.querySelector('nav');
  if (nav && c.headerColour) {
    nav.style.background = c.headerColour;
    if (c.headerColour.includes('rgba') || c.headerColour.includes('transparent')) {
      nav.style.backdropFilter = 'blur(13px)';
      nav.style.webkitBackdropFilter = 'blur(13px)';
      nav.style.borderBottom = '1px solid rgba(255,255,255,0.34)';
      nav.style.boxShadow = '0 4px 12px rgba(46,47,113,0.05)';
    } else {
      nav.style.backdropFilter = 'none';
      nav.style.webkitBackdropFilter = 'none';
      nav.style.borderBottom = 'none';
      nav.style.boxShadow = 'none';
    }
  }
  const trackBtn = document.querySelector('.track-btn');
  if (trackBtn && c.accentColour) trackBtn.style.background = c.accentColour;

  if (c.linkColour) {
    document.querySelectorAll('.nav-links a, .nav-links span').forEach(a => a.style.color = c.linkColour);
  }

  const logoImg = document.querySelector('.nav-logo img');
  if (logoImg) {
    if (!logoImg.dataset.defaultSrc) logoImg.dataset.defaultSrc = logoImg.getAttribute('src');
    if (c.logoUrl) {
      logoImg.src = c.logoUrl;
    } else {
      logoImg.src = logoImg.dataset.defaultSrc;
    }
  }

  if (c.faviconUrl) {
    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = c.faviconUrl;
    document.head.appendChild(link);
  }

  if (c.pageTitle) {
    const el = document.getElementById('page-title-display');
    if (el) el.textContent = c.pageTitle;
  }

  if (c.titleFont) {
    const h1 = document.querySelector('h1');
    if (h1) h1.style.fontFamily = c.titleFont + ', sans-serif';
  }
  if (c.bodyFont) document.body.style.fontFamily = c.bodyFont + ', sans-serif';

  if (c.navLinks) {
    const navLinksEl = document.querySelector('.nav-links');
    if (navLinksEl) {
      navLinksEl.innerHTML = '';
      c.navLinks.forEach(lnk => {
        if (lnk.text) {
          const a = document.createElement('a');
          a.href = lnk.url || '#';
          a.textContent = lnk.text;
          if (c.linkColour) a.style.color = c.linkColour;
          navLinksEl.appendChild(a);
        }
      });
    }
  }

  if (c.supportEmail) { const el = document.getElementById('help-email'); if (el) el.textContent = c.supportEmail; }
  if (c.supportPhone) { const el = document.getElementById('help-phone'); if (el) el.textContent = c.supportPhone; }
}

window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'preview-mode') {
    document.body.classList.toggle('phone-preview', e.data.mode === 'mobile');
    return;
  }
  if (e.data.type !== 'admin-config') return;
  applyBranding(e.data.config);
  if (!e.data.fromStorage) {
    document.body.classList.add('preview-embedded');
  }
});

// ── Apply saved branding from admin on page load ──
(function() {
  const saved = localStorage.getItem('tracking-admin-config');
  if (!saved) return;
  try { applyBranding(JSON.parse(saved)); } catch(e) {}
})();
</script>
</body>
</html>
