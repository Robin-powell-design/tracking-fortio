<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortio — Track your order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      background: #f5f5f5 url('images/background-blobs.png') center center / cover no-repeat;
      background-attachment: fixed;
    }

    /* ── Nav — frosted glass ── */
    nav {
      flex-shrink: 0;
      width: 100%;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(13px);
      -webkit-backdrop-filter: blur(13px);
      border-bottom: 1px solid rgba(255,255,255,0.34);
      box-shadow: 0 4px 12px rgba(46,47,113,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(16px, 2.5vw, 56px);
      height: clamp(56px, 6vw, 87px);
      z-index: 10;
      position: sticky;
      top: 0;
    }
    .nav-logo {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo img {
      display: block;
      height: clamp(24px, 2.4vw, 28px);
      width: auto;
      object-fit: contain;
      max-width: none;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.5vw, 8px);
    }
    .nav-links span {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px clamp(10px, 0.9vw, 13.5px);
      border-radius: 100px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: clamp(14px, 1vw, 16px);
      color: #2C50F2;
      letter-spacing: 0.08px;
      white-space: nowrap;
    }

    /* ── Page body ── */
    .page-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    /* ── Centered content ── */
    .content-col {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: clamp(32px, 5vh, 80px) clamp(24px, 4vw, 60px);
    }
    .content-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 865px;
    }

    /* Text group */
    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(26px, 2.8vw, 48px);
      line-height: 1.3;
      color: #1e2125;
      letter-spacing: -0.24px;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(14px, 1.1vw, 24px);
      line-height: 1.5;
      color: #1e2125;
      letter-spacing: 0.036px;
    }
    .tip {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(12px, 0.85vw, 18px);
      line-height: 1.6;
      color: #4a535c;
      opacity: 0.75;
      letter-spacing: 0.027px;
    }

    /* Search box */
    .search-box {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 865px;
      background: #fff;
      border: 1.254px solid rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 10px 10px 10px 22px;
      margin-bottom: 24px;
      gap: 8px;
    }
    .search-placeholder {
      flex: 1;
      min-width: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(13px, 0.95vw, 17.5px);
      line-height: 1.4;
      color: #040404;
      border: none;
      outline: none;
      background: transparent;
      padding: 8px 4px;
    }
    .search-placeholder::placeholder { color: #66727f; font-weight: 400; }
    .track-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      padding: 0 30px;
      background: #2C50F2;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .track-btn:hover { background: #2445d6; }
    .track-btn span {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      letter-spacing: 0.032px;
      white-space: nowrap;
    }

    /* ── Footer ── */
    footer {
      position: absolute;
      bottom: 16px;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px clamp(24px, 4vw, 64px) 12px;
      background: none;
      border-top: 1px solid rgba(114,114,114,0.49);
      opacity: 0.5;
    }
    .footer-left p, .footer-right p {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(11px, 0.75vw, 14px);
      line-height: 19.5px;
      color: rgba(22, 22, 22, 0.5);
    }
    .footer-left .normal { font-weight: 500; }
    .footer-left .bold   { font-weight: 600; text-transform: uppercase; }
    .footer-right p      { font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page-body { padding: 0 16px; }
      .content-col { padding: 32px 0; }
      .content-inner { max-width: 100%; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .search-box { flex-direction: column; align-items: stretch; background: transparent; border: none; border-radius: 0; padding: 0; gap: 12px; max-width: 100%; }
      .search-placeholder { height: 52px; background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; padding: 0 16px; font-size: 14px; display: block; flex: none; width: 100%; }
      .track-btn { height: 52px; width: 100%; border-radius: 8px; padding: 0; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a class="nav-logo" href="#">
      <img src="images/fortio-logo.svg" alt="Fortio" />
    </a>
    <div class="nav-links">
      <span>Shop</span>
      <span>FAQ</span>
    </div>
  </nav>

  <!-- Page body -->
  <div class="page-body">

    <!-- Centered content -->
    <div class="content-col">
      <div class="content-inner">

        <div class="text-group">
          <h1>Track your order</h1>
          <p class="subtitle">Enter your tracking number to see the latest delivery updates.</p>
          <p class="tip">&#x1F4A1; Your tracking number is in your shipping confirmation email</p>
        </div>

        <div class="search-box">
          <input class="search-placeholder" id="tracking-input" type="text" placeholder="Enter your tracking number: e.g. AA1223456789AUS" autocomplete="off" />
          <button class="track-btn" onclick="trackDelivery()"><span>Track my delivery</span></button>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-left">
        <p><span class="normal">Powered by </span><span class="bold">Borderless360</span></p>
      </div>
      <div class="footer-right">
        <p>&copy; 2017-2026 Borderless360 Limited. All rights reserved.</p>
      </div>
    </footer>

  </div>

<script>
  function trackDelivery() {
    const val = document.getElementById('tracking-input').value.trim();
    if (!val) {
      document.getElementById('tracking-input').focus();
      return;
    }
    window.location.href = 'tracking-demo.html?ref=' + encodeURIComponent(val);
  }

  document.getElementById('tracking-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') trackDelivery();
  });
</script>

</body>
</html>
